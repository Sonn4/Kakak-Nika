<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Kiel Sayang Kakak Nika-->
    <title>Dari Kiel buat mommy</title>
    <style>
      body {
        /* ganti background website */
        background-image: url(https://img.freepik.com/premium-photo/defocused-lights-form-heart-black-background_607094-211.jpg);
      }
    </style>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
  </head>

  <body class="justify-center flex">
    <main
  class="rounded mt-20 p-7 shadow-lg shadow-pink-200 animate__animated animate__backInDown"
  style="
    background: linear-gradient(
      rgba(100,100,100,100.85),
      rgba(100,100,100,100.85)
    ),
    url('https://share.google/czOL3UcSnm0P1CCbz');
    background-size: cover;
    background-position: center;
  "
>
      <!-- Kira kira kakak akan buka filenya ga yak xixixi-->
      <img
        class="cat-img"
        src=" https://share.google/SZtW3n1IP5w0ZpLAW"
        alt="POV Kiel"
        width="300"
      />
      <div class="border-b mt-2 border-2"></div>
      <div class="lh-1 text-center mt-4">
        <!-- ganti nama -->
        <h2 class="title text-black-400 text-s font-semibold">
          Haii kakakk, tujuan awal ini buat nembak, tapi karena udah balikan, aku mau bilang terima kasih banyakk for all yaw, terus aku mau bilang 
        </h2>
        <!-- Mwah -->
        <p class="title question fs-1 text-2xl font-bold text-black-700">kalau aku tuh happy banget sama kakakk, sama aku terus yaww dalam waktu yg lamaa 😭😡
         <h2 class="title text-black-400 text-s font-semibold">*di bukanya pelan aja, biar ada gambarnya 
        </h2>
      </div>
      <div class="buttons mt-5 flex justify-around">
        <!-- Kakak -->
        <button
          type="button"
          class="btn-yes bg-green-500 rounded text-white text-3xl px-2 pt-1 pb-2 animate__pulse animate__animated animate__infinite"
        >
         Mauu
        </button>
        <button
          type="button"
          class="btn-no bg-red-500 rounded text-white text-2xl px-2 pt-1 pb-2"
        >
          Ga
        </button>
      </div>
      <div class="numbers hidden mt-5 flex justify-center">
        <!-- ganti link -->
        <a
          href="https://wa.me/6283805192469?text=EMUACHH%20mwah%20mwahh%2C%20cayang%20banget%20cama%20kakak%20utututu%2C%20gemeshin%20cuantikk%20imoeppp%20sangarr%2C%20tapi%20aslinya%20lucuu%20ucuu%0AI%20lovee%20youu%20kakak%2C%20nah%20berilah%20jawaban%20uu"
          type="button"
          class="bg-green-500 text-white py-1 px-2 rounded btn-yes w-100 text-xl font-bold"
        >
          <!-- ganti tulisan tombol link -->
          Tolong beri jawabannya :')       </a
        >
      </div>
    </main>

    <script>
      const titleElement = document.querySelector(".title");
      const buttonsContainer = document.querySelector(".buttons");
      const numberContainer = document.querySelector(".numbers");
      const yesButton = document.querySelector(".btn-yes");
      const noButton = document.querySelector(".btn-no");
      const catImg = document.querySelector(".cat-img");
      const title = document.querySelector(".title");
      const question = document.querySelector(".question");

      // jumlah gambar
      const MAX_IMAGES = 5;

      let play = true;
      let count = 0;

      // ganti gambar pake link gif yang kalian mau
      let listGambar = [
        "https://share.google/d33caatLFXg8NGPZg",
        "https://c.tenor.com/CQfaIEt8joEAAAAd/tenor.gif",
        "https://share.google/ZOlNiP0EqxClPmdg6",
        "https://media1.tenor.com/m/0Rb6cpBiA-cAAAAC/lucu.gif",
        "https://share.google/RGKtiJejYUX44OZIa",

        // gambar kalo dijawab ya
        " https://share.google/M5NZMNGmkl916Fyvx",
      ];

      yesButton.addEventListener("click", handleYesClick);

      noButton.addEventListener("click", function () {
        title.classList.add("hidden");
        question.classList.add("hidden");
        if (play) {
          count++;
          const imageIndex = Math.min(count, MAX_IMAGES);
          changeImage(imageIndex);
          updateNoButtonText();
          if (count === MAX_IMAGES) {
            play = false;
          }
        }
      });

      function handleYesClick() {
        buttonsContainer.classList.add("hidden");
        title.classList.add("hidden");
        question.classList.add("hidden");
        numberContainer.classList.remove("hidden");
        changeImage(6);
      }

      // ganti kata-kata kalo ditolak
      function generateMessage(count) {
        const messages = ["no", "kok gitu!", "yakin?", "yes ih", "aku maksa", "<--"];

        const messageIndex = Math.min(count, messages.length - 1);
        return messages[messageIndex];
      }

      function changeImage(imageIndex) {
        catImg.src = `${listGambar[imageIndex - 1]}`;
      }

      function updateNoButtonText() {
        noButton.innerHTML = generateMessage(count);
      }
    </script>
  </body>
</html>
